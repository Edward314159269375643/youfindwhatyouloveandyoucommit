<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医院智能导诊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1890ff;
            --secondary-color: #52c41a;
            --text-color: #333;
            --text-secondary: #666;
            --bg-color: #f5f5f5;
            --white: #fff;
            --border-color: #e8e8e8;
            --danger-color: #ff4d4f;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, var(--primary-color), #096dd9);
            color: var(--white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            z-index: 100;
            position: relative;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: var(--white);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: var(--bg-color);
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--primary-color);
            color: var(--white);
            margin-left: 10px;
        }

        .message.assistant .message-avatar {
            background: var(--secondary-color);
            color: var(--white);
            margin-right: 10px;
        }

        .message-content {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--primary-color);
            color: var(--white);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: var(--white);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow);
        }

        .message-content img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
        }

        .message-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
            text-align: right;
        }

        .message.user .message-time {
            text-align: right;
        }

        .message.assistant .message-time {
            text-align: left;
            margin-left: 50px;
        }

        .quick-actions {
            padding: 10px 15px;
            background: var(--white);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .quick-action {
            padding: 8px 16px;
            background: #e6f7ff;
            border: 1px solid var(--primary-color);
            border-radius: 20px;
            color: var(--primary-color);
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quick-action:hover {
            background: var(--primary-color);
            color: var(--white);
        }

        .chat-input-area {
            background: var(--white);
            padding: 12px 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: flex-end;
            gap: 10px;
            position: relative;
        }

        .input-tools {
            display: flex;
            gap: 8px;
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-size: 20px;
        }

        .tool-btn:hover {
            background: var(--primary-color);
            color: var(--white);
        }

        .tool-btn.active {
            background: var(--danger-color);
            color: var(--white);
        }

        .chat-input {
            flex: 1;
            min-height: 40px;
            max-height: 120px;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            resize: none;
            outline: none;
            font-size: 16px;
            line-height: 1.5;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
        }

        .send-btn {
            width: 50px;
            height: 40px;
            border-radius: 20px;
            border: none;
            background: var(--primary-color);
            color: var(--white);
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .send-btn:hover {
            background: #096dd9;
        }

        .send-btn:disabled {
            background: #d9d9d9;
            cursor: not-allowed;
        }

        .voice-recording {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: var(--white);
            padding: 30px 50px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            display: none;
        }

        .voice-recording.show {
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .voice-recording .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .image-preview-container {
            display: none;
            padding: 10px 15px;
            background: var(--white);
            border-top: 1px solid var(--border-color);
        }

        .image-preview-container.show {
            display: block;
        }

        .image-preview {
            position: relative;
            display: inline-block;
            margin-right: 10px;
        }

        .image-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
        }

        .image-preview .remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--danger-color);
            color: var(--white);
            border: none;
            cursor: pointer;
            font-size: 12px;
        }

        .history-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            background: var(--white);
            z-index: 200;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .history-panel.show {
            right: 0;
        }

        .history-header {
            background: var(--primary-color);
            color: var(--white);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-header h2 {
            font-size: 18px;
        }

        .history-actions {
            display: flex;
            gap: 10px;
        }

        .history-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: var(--white);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .history-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .history-session {
            background: var(--bg-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .history-session:hover {
            background: #e6f7ff;
        }

        .history-session.selected {
            background: #e6f7ff;
            border: 2px solid var(--primary-color);
        }

        .session-checkbox {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 22px;
            height: 22px;
            border-radius: 4px;
            border: 2px solid var(--primary-color);
            background: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .session-checkbox.checked {
            background: var(--primary-color);
            color: var(--white);
        }

        .session-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-color);
            padding-right: 40px;
        }

        .session-preview {
            font-size: 14px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .session-time {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .session-actions {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
        }

        .session-action-btn {
            padding: 5px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .session-action-btn.delete {
            background: #fff1f0;
            color: var(--danger-color);
        }

        .session-action-btn.copy {
            background: #f6ffed;
            color: var(--secondary-color);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }

        .typing-indicator {
            display: flex;
            padding: 15px;
            gap: 5px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .modal-content p {
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 30px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .modal-btn.cancel {
            background: #f5f5f5;
            color: var(--text-color);
        }

        .modal-btn.confirm {
            background: var(--danger-color);
            color: var(--white);
        }

        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }

            .quick-actions {
                gap: 8px;
            }

            .quick-action {
                padding: 6px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <header class="chat-header">
        <h1>🏥 医院智能导诊</h1>
        <div class="header-actions">
            <button class="header-btn" onclick="toggleHistoryPanel()" title="历史记录">
                📋
            </button>
            <button class="header-btn" onclick="showHelp()" title="使用帮助">
                ❓
            </button>
        </div>
    </header>

    <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
            <div class="message-avatar">🤖</div>
            <div class="message-content">
                您好！我是医院智能导诊助手。请问有什么可以帮您？您可以：<br><br>
                • 描述您的症状<br>
                • 咨询科室信息<br>
                • 了解就医流程<br>
                • 询问注意事项
            </div>
        </div>
        <div class="message-time">刚刚</div>
    </div>

    <div class="quick-actions">
        <button class="quick-action" onclick="sendQuickMessage('头疼应该挂什么科')">头疼挂什么科</button>
        <button class="quick-action" onclick="sendQuickMessage('体检预约流程')">体检预约</button>
        <button class="quick-action" onclick="sendQuickMessage('医保卡使用方法')">医保卡使用</button>
        <button class="quick-action" onclick="sendQuickMessage('住院手续办理')">住院手续</button>
        <button class="quick-action" onclick="sendQuickMessage('取药流程')">取药流程</button>
    </div>

    <div class="image-preview-container" id="imagePreviewContainer">
        <div class="image-preview" id="imagePreview">
            <img id="previewImage" src="" alt="预览">
            <button class="remove-btn" onclick="removeImage()">×</button>
        </div>
    </div>

    <div class="chat-input-area">
        <div class="input-tools">
            <button class="tool-btn" id="imageBtn" onclick="triggerImageUpload()" title="发送图片">📷</button>
            <button class="tool-btn" id="voiceBtn" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()" title="按住说话">🎤</button>
        </div>
        <textarea class="chat-input" id="messageInput" placeholder="输入您的问题..." rows="1" oninput="autoResize(this)" onkeydown="handleKeyDown(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display: none" onchange="handleImageSelect(event)">

    <div class="voice-recording" id="voiceRecording">
        <div class="icon">🎙️</div>
        <div>正在录音...</div>
        <div id="recordingTime">0:00</div>
    </div>

    <div class="history-panel" id="historyPanel">
        <div class="history-header">
            <h2>📋 对话历史</h2>
            <div class="history-actions">
                <button class="history-btn" id="selectAllBtn" onclick="toggleSelectAll()">全选</button>
                <button class="history-btn" id="deleteSelectedBtn" onclick="deleteSelected()" style="display: none;">删除</button>
                <button class="history-btn" onclick="closeHistoryPanel()">关闭</button>
            </div>
        </div>
        <div class="history-list" id="historyList">
            <div class="empty-state">
                <div class="icon">💬</div>
                <p>暂无历史记录</p>
            </div>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <h3 id="modalTitle">确认删除</h3>
            <p id="modalMessage">确定要删除这条对话记录吗？</p>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm" onclick="confirmModalAction()">确认</button>
            </div>
        </div>
    </div>

    <div class="modal" id="copyModal">
        <div class="modal-content">
            <h3>复制内容</h3>
            <p id="copyContent"></p>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeCopyModal()">关闭</button>
                <button class="modal-btn confirm" onclick="copyToClipboard()" style="background: var(--primary-color);">复制</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const API_BASE_URL = window.CONFIG.API_BASE_URL;
        
        let currentOpenid = localStorage.getItem('openid') || generateOpenid();
        let currentSessionId = localStorage.getItem('currentSessionId');
        let conversationHistory = [];
        let isRecording = false;
        let mediaRecorder;
        let audioChunks = [];
        let recordingTimer;
        let recordingSeconds = 0;
        let selectedSessions = new Set();
        let isSelectMode = false;
        let pendingDeleteSessionId = null;

        function generateOpenid() {
            const openid = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('openid', openid);
            return openid;
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            const imageUrl = document.getElementById('previewImage').src;

            if (!message && !imageUrl) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            if (imageUrl && imageUrl !== window.location.href) {
                await sendImageMessage(imageUrl);
            }

            if (message) {
                addMessageToUI('user', message);
                conversationHistory.push({ role: 'user', content: message });
                
                showTypingIndicator();
                
                try {
                    const response = await fetch(`${API_BASE_URL}/chat/message`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            openid: currentOpenid,
                            message: message,
                            messageType: 'text',
                            sessionId: currentSessionId
                        })
                    });

                    const data = await response.json();
                    
                    hideTypingIndicator();

                    if (data.success) {
                        currentSessionId = data.sessionId;
                        localStorage.setItem('currentSessionId', currentSessionId);
                        addMessageToUI('assistant', data.response);
                        conversationHistory.push({ role: 'assistant', content: data.response });
                    } else {
                        addMessageToUI('assistant', '抱歉，服务出现问题，请稍后再试。');
                    }
                } catch (error) {
                    console.error('发送消息错误:', error);
                    hideTypingIndicator();
                    addMessageToUI('assistant', '网络连接失败，请检查网络后重试。');
                }
            }

            input.value = '';
            input.style.height = 'auto';
            removeImage();
            sendBtn.disabled = false;
        }

        function addMessageToUI(role, content) {
            const messagesContainer = document.getElementById('chatMessages');
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = role === 'user' ? '👤' : '🤖';
            
            let contentWithLinks = content;
            contentWithLinks = contentWithLinks.replace(/\n/g, '<br>');
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${contentWithLinks}</div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = time;
            messagesContainer.appendChild(timeDiv);
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const messagesContainer = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function sendQuickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }

        function triggerImageUpload() {
            document.getElementById('imageInput').click();
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImage').src = e.target.result;
                    document.getElementById('imagePreviewContainer').classList.add('show');
                };
                reader.readAsDataURL(file);
            }
        }

        function removeImage() {
            document.getElementById('imageInput').value = '';
            document.getElementById('previewImage').src = '';
            document.getElementById('imagePreviewContainer').classList.remove('show');
        }

        async function sendImageMessage(imageData) {
            addMessageToUI('user', '[图片]');
            
            const blob = await fetch(imageData).then(r => r.blob());
            const formData = new FormData();
            formData.append('image', blob, 'image.jpg');

            try {
                const response = await fetch(`${API_BASE_URL}/chat/upload/image`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showTypingIndicator();
                    
                    await fetch(`${API_BASE_URL}/chat/message`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            openid: currentOpenid,
                            message: `[图片: ${data.url}]`,
                            messageType: 'image',
                            sessionId: currentSessionId
                        })
                    });

                    setTimeout(() => {
                        hideTypingIndicator();
                        addMessageToUI('assistant', '已收到您的图片，请问有什么可以帮您？');
                    }, 1000);
                }
            } catch (error) {
                console.error('上传图片错误:', error);
            }
        }

        async function startRecording() {
            if (isRecording) return;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    await uploadAudio(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                
                document.getElementById('voiceBtn').classList.add('active');
                document.getElementById('voiceRecording').classList.add('show');
                
                recordingSeconds = 0;
                updateRecordingTime();
                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    updateRecordingTime();
                }, 1000);

            } catch (error) {
                console.error('录音错误:', error);
                alert('无法访问麦克风，请检查权限设置');
            }
        }

        function stopRecording() {
            if (!isRecording) return;

            mediaRecorder.stop();
            isRecording = false;
            
            document.getElementById('voiceBtn').classList.remove('active');
            document.getElementById('voiceRecording').classList.remove('show');
            
            clearInterval(recordingTimer);
        }

        function updateRecordingTime() {
            const minutes = Math.floor(recordingSeconds / 60);
            const seconds = recordingSeconds % 60;
            document.getElementById('recordingTime').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        async function uploadAudio(blob) {
            const formData = new FormData();
            formData.append('voice', blob, 'voice.wav');

            try {
                const response = await fetch(`${API_BASE_URL}/chat/upload/voice`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addMessageToUI('user', '[语音消息]');
                    showTypingIndicator();
                    
                    setTimeout(() => {
                        hideTypingIndicator();
                        addMessageToUI('assistant', '已收到您的语音消息，正在处理中...');
                    }, 1500);
                }
            } catch (error) {
                console.error('上传语音错误:', error);
            }
        }

        async function toggleHistoryPanel() {
            const panel = document.getElementById('historyPanel');
            panel.classList.toggle('show');
            
            if (panel.classList.contains('show')) {
                await loadHistory();
            }
        }

        function closeHistoryPanel() {
            document.getElementById('historyPanel').classList.remove('show');
            exitSelectMode();
        }

        async function loadHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/chat/history/${currentOpenid}`);
                const data = await response.json();

                if (data.success && data.sessions.length > 0) {
                    historyList.innerHTML = data.sessions.map(session => {
                        const firstMessage = session.messages[0]?.content || '新对话';
                        const lastMessage = session.messages[session.messages.length - 1]?.content || '';
                        const time = new Date(session.lastTime).toLocaleString('zh-CN');
                        const isSelected = selectedSessions.has(session.sessionId);
                        
                        return `
                            <div class="history-session ${isSelected ? 'selected' : ''}" data-session-id="${session.sessionId}">
                                <div class="session-checkbox ${isSelected ? 'checked' : ''}" onclick="toggleSessionSelection(event, '${session.sessionId}')">
                                    ${isSelected ? '✓' : ''}
                                </div>
                                <div class="session-title" onclick="loadSession('${session.sessionId}')">
                                    ${formatPreview(firstMessage)}
                                </div>
                                <div class="session-preview">${formatPreview(lastMessage)}</div>
                                <div class="session-time">${time}</div>
                                <div class="session-actions">
                                    <button class="session-action-btn copy" onclick="copySessionContent('${session.sessionId}')">复制</button>
                                    <button class="session-action-btn delete" onclick="confirmDeleteSession('${session.sessionId}')">删除</button>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    historyList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">💬</div>
                            <p>暂无历史记录</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('加载历史记录错误:', error);
                historyList.innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
            }
        }

        function formatPreview(text) {
            if (!text) return '无内容';
            return text.length > 30 ? text.substring(0, 30) + '...' : text;
        }

        async function loadSession(sessionId) {
            if (isSelectMode) return;
            
            try {
                const response = await fetch(`${API_BASE_URL}/chat/history/${currentOpenid}`);
                const data = await response.json();
                
                const session = data.sessions.find(s => s.sessionId === sessionId);
                
                if (session) {
                    const messagesContainer = document.getElementById('chatMessages');
                    messagesContainer.innerHTML = '';
                    
                    session.messages.forEach(msg => {
                        const role = msg.is_from_user ? 'user' : 'assistant';
                        addMessageToUI(role, msg.content);
                    });
                    
                    currentSessionId = sessionId;
                    localStorage.setItem('currentSessionId', currentSessionId);
                    
                    closeHistoryPanel();
                }
            } catch (error) {
                console.error('加载会话错误:', error);
            }
        }

        function toggleSessionSelection(event, sessionId) {
            event.stopPropagation();
            
            if (!isSelectMode) {
                isSelectMode = true;
                document.getElementById('selectAllBtn').style.display = 'inline-block';
                document.getElementById('deleteSelectedBtn').style.display = 'inline-block';
            }
            
            if (selectedSessions.has(sessionId)) {
                selectedSessions.delete(sessionId);
            } else {
                selectedSessions.add(sessionId);
            }
            
            const sessionElement = document.querySelector(`[data-session-id="${sessionId}"]`);
            const checkbox = sessionElement.querySelector('.session-checkbox');
            
            if (selectedSessions.has(sessionId)) {
                sessionElement.classList.add('selected');
                checkbox.classList.add('checked');
                checkbox.textContent = '✓';
            } else {
                sessionElement.classList.remove('selected');
                checkbox.classList.remove('checked');
                checkbox.textContent = '';
            }
            
            if (selectedSessions.size === 0) {
                exitSelectMode();
            }
        }

        function toggleSelectAll() {
            const sessions = document.querySelectorAll('.history-session');
            
            if (selectedSessions.size === sessions.length) {
                selectedSessions.clear();
                sessions.forEach(session => {
                    session.classList.remove('selected');
                    session.querySelector('.session-checkbox').classList.remove('checked');
                    session.querySelector('.session-checkbox').textContent = '';
                });
            } else {
                sessions.forEach(session => {
                    const sessionId = session.dataset.sessionId;
                    selectedSessions.add(sessionId);
                    session.classList.add('selected');
                    session.querySelector('.session-checkbox').classList.add('checked');
                    session.querySelector('.session-checkbox').textContent = '✓';
                });
            }
        }

        function exitSelectMode() {
            isSelectMode = false;
            selectedSessions.clear();
            document.getElementById('selectAllBtn').style.display = 'inline-block';
            document.getElementById('deleteSelectedBtn').style.display = 'none';
            
            document.querySelectorAll('.history-session').forEach(session => {
                session.classList.remove('selected');
                session.querySelector('.session-checkbox').classList.remove('checked');
                session.querySelector('.session-checkbox').textContent = '';
            });
        }

        function confirmDeleteSession(sessionId) {
            pendingDeleteSessionId = sessionId;
            document.getElementById('modalTitle').textContent = '确认删除';
            document.getElementById('modalMessage').textContent = '确定要删除这条对话记录吗？此操作不可恢复。';
            document.getElementById('confirmModal').classList.add('show');
        }

        function deleteSelected() {
            if (selectedSessions.size === 0) return;
            
            document.getElementById('modalTitle').textContent = '确认批量删除';
            document.getElementById('modalMessage').textContent = `确定要删除选中的 ${selectedSessions.size} 条对话记录吗？此操作不可恢复。`;
            document.getElementById('confirmModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('show');
            pendingDeleteSessionId = null;
        }

        async function confirmModalAction() {
            if (pendingDeleteSessionId) {
                await deleteSession(pendingDeleteSessionId);
            } else if (selectedSessions.size > 0) {
                await deleteBatchSessions();
            }
            closeModal();
        }

        async function deleteSession(sessionId) {
            try {
                const response = await fetch(`${API_BASE_URL}/chat/conversation/${sessionId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    await loadHistory();
                    
                    if (currentSessionId === sessionId) {
                        currentSessionId = null;
                        localStorage.removeItem('currentSessionId');
                        document.getElementById('chatMessages').innerHTML = `
                            <div class="message assistant">
                                <div class="message-avatar">🤖</div>
                                <div class="message-content">
                                    对话记录已删除。
                                </div>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                console.error('删除会话错误:', error);
            }
        }

        async function deleteBatchSessions() {
            try {
                const response = await fetch(`${API_BASE_URL}/chat/batch-delete`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionIds: Array.from(selectedSessions) })
                });
                
                if (response.ok) {
                    exitSelectMode();
                    await loadHistory();
                    
                    document.getElementById('chatMessages').innerHTML = `
                        <div class="message assistant">
                            <div class="message-avatar">🤖</div>
                            <div class="message-content">
                                已删除 ${selectedSessions.size} 条对话记录。
                            </div>
                        </div>
                    `;
                    
                    currentSessionId = null;
                    localStorage.removeItem('currentSessionId');
                }
            } catch (error) {
                console.error('批量删除错误:', error);
            }
        }

        function copySessionContent(sessionId) {
            fetch(`${API_BASE_URL}/chat/history/${currentOpenid}`)
                .then(response => response.json())
                .then(data => {
                    const session = data.sessions.find(s => s.sessionId === sessionId);
                    if (session) {
                        const content = session.messages.map(m => {
                            const role = m.is_from_user ? '我' : '助手';
                            return `${role}: ${m.content}`;
                        }).join('\n');
                        
                        document.getElementById('copyContent').textContent = content;
                        document.getElementById('copyModal').classList.add('show');
                    }
                })
                .catch(error => console.error('复制内容错误:', error));
        }

        function closeCopyModal() {
            document.getElementById('copyModal').classList.remove('show');
        }

        async function copyToClipboard() {
            const content = document.getElementById('copyContent').textContent;
            try {
                await navigator.clipboard.writeText(content);
                alert('已复制到剪贴板');
                closeCopyModal();
            } catch (error) {
                console.error('复制失败:', error);
            }
        }

        function showHelp() {
            alert('🏥 医院智能导诊助手使用指南\n\n' +
                  '📝 输入问题：直接输入您的症状或问题\n\n' +
                  '🎤 语音输入：长按麦克风按钮说话\n\n' +
                  '📷 图片上传：点击相机按钮上传图片\n\n' +
                  '📋 历史记录：点击右上角按钮查看历史\n\n' +
                  '💡 快捷问题：底部快速问题按钮');
        }

        window.onerror = function(msg, url, line, col, error) {
            console.error('页面错误:', msg, line);
        };
    </script>
</body>
</html>
