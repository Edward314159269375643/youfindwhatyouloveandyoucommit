<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 数据看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #1890ff;
            --success-color: #52c41a;
            --warning-color: #faad14;
            --danger-color: #ff4d4f;
            --text-color: #333;
            --text-secondary: #666;
            --bg-color: #f0f2f5;
            --white: #fff;
            --border-color: #e8e8e8;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, #001529, #000c17);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: all 0.3s;
            z-index: 100;
        }

        .sidebar.collapsed {
            width: 80px;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h1 {
            font-size: 18px;
            white-space: nowrap;
        }

        .sidebar.collapsed .sidebar-header h1 {
            display: none;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        .nav-menu {
            padding: 10px 0;
        }

        .nav-item {
            padding: 14px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .nav-item.active {
            background: var(--primary-color);
            border-left-color: var(--warning-color);
        }

        .nav-item .icon {
            font-size: 20px;
            margin-right: 12px;
            width: 24px;
            text-align: center;
        }

        .sidebar.collapsed .nav-item .text {
            display: none;
        }

        .nav-item .text {
            font-size: 14px;
            white-space: nowrap;
        }

        .main-content {
            flex: 1;
            margin-left: 240px;
            transition: margin-left 0.3s;
        }

        .sidebar.collapsed + .main-content {
            margin-left: 80px;
        }

        .top-bar {
            background: var(--white);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .breadcrumb span {
            color: var(--text-color);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .user-details {
            text-align: right;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-role {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .logout-btn {
            padding: 8px 16px;
            background: #fff1f0;
            color: var(--danger-color);
            border: 1px solid #ffccc7;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: var(--danger-color);
            color: white;
        }

        .content-area {
            padding: 30px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-color);
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
        }

        .stat-card.blue::before { background: var(--primary-color); }
        .stat-card.green::before { background: var(--success-color); }
        .stat-card.orange::before { background: var(--warning-color); }
        .stat-card.red::before { background: var(--danger-color); }

        .stat-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .stat-change {
            font-size: 12px;
            margin-top: 10px;
        }

        .stat-change.up { color: var(--success-color); }
        .stat-change.down { color: var(--danger-color); }

        .card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 25px;
        }

        .card-header {
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #096dd9;
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-default {
            background: #f5f5f5;
            color: var(--text-color);
        }

        .card-body {
            padding: 25px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: #fafafa;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }

        tr:hover {
            background: #fafafa;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-primary {
            background: #e6f7ff;
            color: var(--primary-color);
        }

        .badge-success {
            background: #f6ffed;
            color: var(--success-color);
        }

        .badge-warning {
            background: #fffbe6;
            color: var(--warning-color);
        }

        .badge-danger {
            background: #fff1f0;
            color: var(--danger-color);
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .action-btn.view {
            background: #e6f7ff;
            color: var(--primary-color);
        }

        .action-btn.edit {
            background: #f6ffed;
            color: var(--success-color);
        }

        .action-btn.delete {
            background: #fff1f0;
            color: var(--danger-color);
        }

        .action-btn.add {
            background: #f9f0ff;
            color: #722ed1;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }

        .page-btn {
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .page-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .filter-select {
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        .chart-container {
            height: 300px;
            margin-top: 20px;
        }

        .chart-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            border-radius: 8px;
            color: var(--text-secondary);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }

            .sidebar .nav-item .text {
                display: none;
            }

            .main-content {
                margin-left: 80px;
            }

            .stats-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>🏥 管理后台</h1>
                <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
            </div>
            
            <nav class="nav-menu">
                <div class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
                    <span class="icon">📊</span>
                    <span class="text">数据看板</span>
                </div>
                <div class="nav-item" data-page="questions" onclick="navigateTo('questions')">
                    <span class="icon">💬</span>
                    <span class="text">今日问题</span>
                </div>
                <div class="nav-item" data-page="frequent" onclick="navigateTo('frequent')">
                    <span class="icon">🔥</span>
                    <span class="text">高频问题</span>
                </div>
                <div class="nav-item" data-page="knowledge" onclick="navigateTo('knowledge')">
                    <span class="icon">📚</span>
                    <span class="text">知识库管理</span>
                </div>
                <div class="nav-item" data-page="users" onclick="navigateTo('users')">
                    <span class="icon">👥</span>
                    <span class="text">用户管理</span>
                </div>
                <div class="nav-item" data-page="logs" onclick="navigateTo('logs')">
                    <span class="icon">📝</span>
                    <span class="text">操作日志</span>
                </div>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="breadcrumb">
                    首页 / <span id="currentPageName">数据看板</span>
                </div>
                <div class="user-info">
                    <div class="user-details">
                        <div class="user-name" id="userName">加载中...</div>
                        <div class="user-role" id="userRole">加载中...</div>
                    </div>
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <button class="logout-btn" onclick="logout()">退出登录</button>
                </div>
            </header>

            <div class="content-area" id="mainContent">
            </div>
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script>
        const API_BASE_URL = window.CONFIG.API_BASE_URL;
        
        let currentUser = null;
        let currentPage = 'dashboard';
        let currentData = {};

        checkAuth();

        function checkAuth() {
            const token = localStorage.getItem('adminToken');
            const user = localStorage.getItem('adminUser');
            
            if (!token || !user) {
                window.location.href = 'login.html';
                return;
            }
            
            currentUser = JSON.parse(user);
            document.getElementById('userName').textContent = currentUser.real_name || currentUser.username;
            document.getElementById('userRole').textContent = getRoleName(currentUser.role);
            document.getElementById('userAvatar').textContent = (currentUser.real_name || currentUser.username).charAt(0);
            
            loadPage('dashboard');
        }

        function getRoleName(role) {
            const roles = {
                'admin': '管理员',
                'doctor': '医生',
                'operator': '操作员'
            };
            return roles[role] || role;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        function navigateTo(page) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            document.querySelector(`[data-page="${page}"]`).classList.add('active');
            
            currentPage = page;
            loadPage(page);
            
            const pageNames = {
                'dashboard': '数据看板',
                'questions': '今日问题',
                'frequent': '高频问题',
                'knowledge': '知识库管理',
                'users': '用户管理',
                'logs': '操作日志'
            };
            document.getElementById('currentPageName').textContent = pageNames[page];
        }

        function loadPage(page) {
            const content = document.getElementById('mainContent');
            
            switch(page) {
                case 'dashboard':
                    loadDashboard();
                    break;
                case 'questions':
                    loadQuestions();
                    break;
                case 'frequent':
                    loadFrequentQuestions();
                    break;
                case 'knowledge':
                    loadKnowledgeBase();
                    break;
                case 'users':
                    loadUsers();
                    break;
                case 'logs':
                    loadLogs();
                    break;
                default:
                    loadDashboard();
            }
        }

        async function loadDashboard() {
            const content = document.getElementById('mainContent');
            content.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const [statsRes, questionsRes] = await Promise.all([
                    fetchWithAuth(`${API_BASE_URL}/admin/dashboard/stats`),
                    fetchWithAuth(`${API_BASE_URL}/admin/dashboard/today-questions?limit=5`)
                ]);
                
                const stats = await statsRes.json();
                const questions = await questionsRes.json();
                
                content.innerHTML = `
                    <h2 class="page-title">📊 数据看板</h2>
                    
                    <div class="stats-cards">
                        <div class="stat-card blue">
                            <div class="stat-icon">👥</div>
                            <div class="stat-value">${stats.stats.today.unique_users || 0}</div>
                            <div class="stat-label">今日访客数</div>
                            <div class="stat-change up">↑ 较昨日增长</div>
                        </div>
                        <div class="stat-card green">
                            <div class="stat-icon">💬</div>
                            <div class="stat-value">${stats.stats.today.total_messages || 0}</div>
                            <div class="stat-label">今日消息数</div>
                            <div class="stat-change up">↑ 较昨日增长</div>
                        </div>
                        <div class="stat-card orange">
                            <div class="stat-icon">📅</div>
                            <div class="stat-value">${stats.stats.week.unique_users || 0}</div>
                            <div class="stat-label">本周访客数</div>
                            <div class="stat-change up">↑ 持续增长</div>
                        </div>
                        <div class="stat-card red">
                            <div class="stat-icon">🔥</div>
                            <div class="stat-value">${stats.stats.week.total_messages || 0}</div>
                            <div class="stat-label">本周消息数</div>
                            <div class="stat-change up">↑ 活跃度高</div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">📈 30天趋势图</h3>
                        </div>
                        <div class="card-body">
                            <div class="chart-container">
                                <div class="chart-placeholder">
                                    <p>趋势图展示区域（可集成 ECharts）</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">💬 最新用户问题</h3>
                            <button class="btn btn-primary" onclick="navigateTo('questions')">查看全部</button>
                        </div>
                        <div class="card-body">
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>用户</th>
                                            <th>问题内容</th>
                                            <th>时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${(questions.questions || []).slice(0, 5).map(q => `
                                            <tr>
                                                <td>${q.nickname || q.openid || '匿名用户'}</td>
                                                <td>${q.content.substring(0, 50)}${q.content.length > 50 ? '...' : ''}</td>
                                                <td>${new Date(q.created_at).toLocaleString('zh-CN')}</td>
                                                <td>
                                                    <div class="action-btns">
                                                        <button class="action-btn view" onclick="viewQuestion(${q.id})">查看</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            ${(!questions.questions || questions.questions.length === 0) ? '<div class="empty-state"><p>暂无数据</p></div>' : ''}
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('加载仪表盘错误:', error);
                content.innerHTML = '<div class="empty-state"><p>加载失败，请刷新页面</p></div>';
            }
        }

        async function loadQuestions() {
            const content = document.getElementById('mainContent');
            content.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/admin/dashboard/today-questions`);
                const data = await response.json();
                
                content.innerHTML = `
                    <h2 class="page-title">💬 今日用户问题</h2>
                    
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">问题列表</h3>
                        </div>
                        <div class="card-body">
                            <div class="search-box">
                                <input type="text" class="search-input" placeholder="搜索问题内容..." id="searchInput" onkeyup="searchQuestions()">
                                <input type="date" class="filter-select" id="dateFilter" onchange="filterByDate()">
                            </div>
                            
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>用户标识</th>
                                            <th>问题内容</th>
                                            <th>消息类型</th>
                                            <th>时间</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="questionsTableBody">
                                        ${(data.questions || []).map(q => `
                                            <tr>
                                                <td>${q.id}</td>
                                                <td>${q.openid || '匿名'}</td>
                                                <td>${q.content.substring(0, 80)}${q.content.length > 80 ? '...' : ''}</td>
                                                <td><span class="badge badge-primary">${q.message_type}</span></td>
                                                <td>${new Date(q.created_at).toLocaleString('zh-CN')}</td>
                                                <td>
                                                    <div class="action-btns">
                                                        <button class="action-btn view" onclick="viewQuestion(${q.id})">查看</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                            
                            ${(!data.questions || data.questions.length === 0) ? '<div class="empty-state"><p>暂无问题记录</p></div>' : ''}
                            
                            <div class="pagination" id="questionsPagination">
                                ${generatePagination(data.pagination)}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('加载问题列表错误:', error);
                content.innerHTML = '<div class="empty-state"><p>加载失败</p></div>';
            }
        }

        async function loadFrequentQuestions() {
            const content = document.getElementById('mainContent');
            content.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/admin/frequent-questions`);
                const data = await response.json();
                
                content.innerHTML = `
                    <h2 class="page-title">🔥 高频问题统计</h2>
                    
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">热点问题分析</h3>
                            <p style="color: var(--text-secondary); font-size: 14px;">基于向量聚合与语义匹配技术自动识别</p>
                        </div>
                        <div class="card-body">
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>排名</th>
                                            <th>问题内容</th>
                                            <th>出现频次</th>
                                            <th>最后出现</th>
                                            <th>关联知识</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${(data.questions || []).map((q, index) => `
                                            <tr>
                                                <td><span class="badge badge-warning">${index + 1}</span></td>
                                                <td>${q.normalized_question}</td>
                                                <td><strong style="color: var(--danger-color)">${q.frequency}</strong> 次</td>
                                                <td>${new Date(q.last_occurrence).toLocaleString('zh-CN')}</td>
                                                <td>${q.matched_question ? '<span class="badge badge-success">已关联</span>' : '<span class="badge badge-danger">未关联</span>'}</td>

            }

        async function addToKnowledgeBase(questionStatId) {
            const answer = prompt('请输入该问题的标准回答：');
            if (!answer) return;
            
            const category = prompt('请输入分类（可选，默认"高频问题"）：') || '高频问题';
            
            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/admin/frequent-questions/add-to-knowledge-base`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ questionStatId, category, answer })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('已成功添加到知识库！');
                    loadFrequentQuestions();
                } else {
                    alert('添加失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                console.error('添加知识库错误:', error);
                alert('添加失败，请重试');
            }
        }

        async function deleteFrequentQuestion(id) {
            if (!confirm('确定要删除这条高频问题记录吗？')) return;
            
            try {
                const response = await fetchWithAuth(`${API_BASE_URL}/admin/frequent-questions/${id}`, {
                    method: 'DELETE'
                });

                    alert('删除成功');
                    loadFrequentQuestions();
                }
            } catch (error) {
                console.error('删除错误:', error);
            }
        }

        function generatePagination(pagination) {
            if (!pagination || pagination.totalPages <= 1) return '';
            
            let html = '';
            for (let i = 1; i <= pagination.totalPages; i++) {
                html += `<button class="page-btn ${i === pagination.page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            return html;
        }

            console.log('跳转页面:', page);

        async function fetchWithAuth(url, options = {}) {
            const token = localStorage.getItem('adminToken');
            
            const headers = {
                ...options.headers,
                'Authorization': `Bearer ${token}`
            };
            
            if (options.body && typeof options.body === 'object' && !(options.body instanceof FormData)) {
                headers['Content-Type'] = 'application/json';
            }
            
            const response = await fetch(url, {
                ...options,
                headers
            });
            
            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('adminToken');
                localStorage.removeItem('adminUser');
                window.location.href = 'login.html';
                throw new Error('未授权');
            }
            
            return response;
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('adminToken');
                localStorage.removeItem('adminUser');
                window.location.href = 'login.html';
            }
        }
